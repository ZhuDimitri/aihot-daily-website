*{margin:0;padding:0;box-sizing:border-box}
:root{

body{

}
.container{max-width:1200px;margin:0 auto;padding:0 20px}

/* Hero */
.hero{
  background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#1a1f3a 100%);
  border-bottom:1px solid var(--border);
  padding:48px 0 40px;
  position:relative;overflow:hidden;
}
.hero::before{
  content:"";position:absolute;top:-50%;right:-20%;width:500px;height:500px;
  background:radial-gradient(circle,rgba(88,166,255,0.08) 0%,transparent 70%);
  border-radius:50%;
}
.hero::after{
  content:"";position:absolute;bottom:-30%;left:-10%;width:400px;height:400px;
  background:radial-gradient(circle,rgba(188,140,255,0.06) 0%,transparent 70%);
  border-radius:50%;
}
.hero-content{position:relative;z-index:1}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(88,166,255,0.1);border:1px solid rgba(88,166,255,0.3);
  color:var(--accent);padding:4px 14px;border-radius:20px;
  font-size:13px;font-weight:500;margin-bottom:16px;
}
.hero-badge .dot{width:8px;height:8px;border-radius:50%;background:var(--accent3);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.hero h1{
  font-size:32px;font-weight:700;margin-bottom:8px;
  background:linear-gradient(135deg,#e6edf3 0%,#58a6ff 50%,#bc8cff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-date{font-size:15px;color:var(--text-muted);margin-bottom:24px}
.hero-date .window{font-size:13px;color:var(--text-dim);margin-top:4px}
.hero-stats{display:flex;gap:12px;flex-wrap:wrap}
.stat-chip{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px 20px;
  display:flex;flex-direction:column;align-items:center;min-width:80px;
  transition:border-color 0.2s;
}
.stat-chip:hover{border-color:var(--accent)}
.stat-chip.total{
  background:linear-gradient(135deg,rgba(88,166,255,0.15),rgba(188,140,255,0.1));
  border-color:rgba(88,166,255,0.4);
}
.stat-chip .num{font-size:24px;font-weight:700;color:var(--text)}
.stat-chip.total .num{color:var(--accent)}
.stat-chip .label{font-size:12px;color:var(--text-muted);margin-top:2px;text-align:center}
.stat-chip .dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
.dot-c1{background:var(--accent)}.dot-c2{background:var(--accent4)}.dot-c3{background:var(--accent3)}
.dot-c4{background:var(--accent2)}.dot-c5{background:var(--accent5)}

/* Anchor Nav */
.anchor-nav{
  position:sticky;top:0;z-index:100;
  background:rgba(13,17,23,0.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:12px 0;
}
.anchor-nav-inner{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.anchor-nav a{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 16px;border-radius:20px;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text-muted);text-decoration:none;font-size:13px;font-weight:500;
  transition:all 0.2s;white-space:nowrap;
}
.anchor-nav a:hover{background:var(--surface-hover);color:var(--text);border-color:var(--accent)}
.anchor-nav a .count{
  background:rgba(255,255,255,0.08);padding:1px 7px;border-radius:10px;
  font-size:11px;font-weight:600;
}

/* Sections */
main{padding:32px 0 48px}

.section-header{

  margin-bottom:20px;padding-bottom:12px;

}

}

/* Card Grid */
.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:16px;
}
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;
  display:flex;flex-direction:column;gap:10px;
  transition:all 0.2s;position:relative;overflow:hidden;
}
.card::before{
  content:"";position:absolute;top:0;left:0;width:3px;height:100%;
  background:var(--accent);opacity:0;transition:opacity 0.2s;
}
.card:hover{background:var(--surface-hover);border-color:rgba(88,166,255,0.4);transform:translateY(-2px)}
.card:hover::before{opacity:1}
.card-top{display:flex;align-items:flex-start;gap:10px}
.card-num{
  flex-shrink:0;width:26px;height:26px;border-radius:8px;
  background:rgba(88,166,255,0.1);color:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;
}
.card-title{
  font-size:15px;font-weight:600;line-height:1.5;color:var(--text);
  flex:1;
}
.card-source{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.source-chip{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(255,255,255,0.05);border:1px solid var(--border);
  color:var(--text-muted);padding:3px 10px;border-radius:12px;
  font-size:12px;font-weight:500;
}
.source-chip svg{width:11px;height:11px;flex-shrink:0;opacity:0.7}
.card-summary{
  font-size:13px;color:var(--text-muted);line-height:1.7;flex:1;
}
.card-link{
  display:inline-flex;align-items:center;gap:5px;
  color:var(--accent);text-decoration:none;font-size:13px;font-weight:500;
  transition:color 0.2s;margin-top:auto;
}
.card-link:hover{color:var(--accent2)}
.card-link svg{width:13px;height:13px}

.empty-section{

/* Footer */
footer{

const SECTION_ICONS = ["🧠","🚀","📰","📄","💡"];
const SECTION_COLORS = ["c1","c2","c3","c4","c5"];
const STAT_DOTS = ["c1","c2","c3","c4","c5"];

function renderHero(){
  document.getElementById("heroDate").textContent = DATA.dateDisplay;
  document.getElementById("heroWindow").textContent =
    "覆盖窗口 " + DATA.windowStart + " — " + DATA.windowEnd + " (北京时间)";

  let html = "";
  html += '<div class="stat-chip total"><span class="num">' + DATA.total + '</span><span class="label">总条数</span></div>';
  DATA.sections.forEach(function(s, i){
    var dotClass = STAT_DOTS[i] || "c1";
    html += '<div class="stat-chip">' +
      '<span class="num">' + s.count + '</span>' +
      '<span class="label"><span class="dot dot-' + dotClass + '"></span>' + s.label + '</span>' +
      '</div>';
  });
  document.getElementById("heroStats").innerHTML = html;
}

function renderNav(){
  let html = "";
  DATA.sections.forEach(function(s, i){
    var id = "sec-" + i;
    html += '<a href="#' + id + '">' + s.label +
      '<span class="count">' + s.count + '</span></a>';
  });
  document.getElementById("anchorNav").innerHTML = html;
}

function renderMain(){
  let html = "";
  DATA.sections.forEach(function(s, i){
    var id = "sec-" + i;
    var colorClass = SECTION_COLORS[i] || "c1";
    var icon = SECTION_ICONS[i] || "📌";
    html += '<section class="section" id="' + id + '">';
    html += '<div class="section-header">';
    html += '<div class="section-icon icon-' + colorClass + '">' + icon + '</div>';
    html += '<h2>' + s.label + '</h2>';
    html += '<span class="sec-count">' + s.count + ' 条</span>';
    html += '</div>';

    if(s.items.length === 0){
      html += '<div class="empty-section">本期暂无内容</div>';
    } else {
      html += '<div class="card-grid">';
      s.items.forEach(function(item){
        html += '<div class="card">';
        html += '<div class="card-top">';
        html += '<div class="card-num">' + item.num + '</div>';
        html += '<div class="card-title">' + escapeHtml(item.title) + '</div>';
        html += '</div>';
        html += '<div class="card-source">';
        html += '<span class="source-chip">' + escapeHtml(item.sourceName) + '</span>';
        html += '</div>';
        if(item.summary){
          html += '<div class="card-summary">' + escapeHtml(item.summary) + '</div>';
        }
        if(item.sourceUrl){
          html += '<a class="card-link" href="' + escapeAttr(item.sourceUrl) + '" target="_blank" rel="noopener noreferrer">阅读原文';
          html += '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M3.75 2A1.75 1.75 0 0 0 2 3.75v8.5c0 .966.784 1.75 1.75 1.75h8.5A1.75 1.75 0 0 0 14 12.25v-3.5a.75.75 0 0 0-1.5 0v3.5a.25.25 0 0 1-.25.25h-8.5a.25.25 0 0 1-.25-.25v-8.5a.25.25 0 0 1 .25-.25h3.5a.75.75 0 0 0 0-1.5h-3.5Zm6.5-.25A.75.75 0 0 1 11 1h3.25a.75.75 0 0 1 0 1.5h-1.69l-5.97 5.97a.75.75 0 0 1-1.06-1.06L11.5 1.44v-.19Z"/></svg>';
          html += '</a>';
        }
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</section>';
  });
  document.getElementById("mainContent").innerHTML = html;
}

function renderFooter(){
  document.getElementById("footerTotal").textContent =
    "共 " + DATA.total + " 条 AI 动态 · 五大版块全景速览";
}

function escapeHtml(str){
  if(!str) return "";
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function escapeAttr(str){
  if(!str) return "";
  return str.replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

renderHero();
renderNav();
renderMain();
renderFooter();
</script>
